<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>IA Chat Offline</title>
    <!-- Librerías locales - con manejo de CORS -->
    <script src="jszip.min.js" crossorigin="anonymous"></script>
    <script src="transformers.min.js" crossorigin="anonymous"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #e5ddd5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #header { background: #075e54; color: white; padding: 15px; text-align: center; font-weight: bold; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 70%; padding: 10px; border-radius: 10px; font-size: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .ai { align-self: flex-start; background: white; }
        .user { align-self: flex-end; background: #dcf8c6; }
        .sys { align-self: center; background: #fff5c4; font-size: 12px; color: #555; }
        .input-area { background: white; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        input[type="text"] { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ddd; outline: none; }
        button { background: #075e54; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>


<div id="header">IA Offline - Multilingüe</div>


<div id="chat">
    <div class="bubble sys">Selecciona tu <b>modelo.zip</b> para activar la IA</div>
</div>


<div class="input-area">
    <input type="file" id="zipInput" accept=".zip" style="width: 150px;">
    <input type="text" id="userInput" placeholder="Escribe un mensaje..." disabled>
    <button id="sendBtn" disabled>Enviar</button>
</div>


<script>
    const chat = document.getElementById('chat');
    const zipInput = document.getElementById('zipInput');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');


    let extractor;


    function addMsg(text, type) {
        const div = document.createElement('div');
        div.className = `bubble ${type}`;
        div.innerText = text;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }


    // Verificar librerías cargadas correctamente
    let libreriasCargadas = false;
    
    function esperarLibrerias() {
        return new Promise((resolve) => {
            let intentos = 0;
            const verificar = setInterval(() => {
                if (window.JSZip && window.transformers) {
                    clearInterval(verificar);
                    libreriasCargadas = true;
                    console.log("✓ Librerías cargadas correctamente");
                    resolve();
                } else if (intentos++ > 30) {
                    clearInterval(verificar);
                    addMsg("⚠️ Advertencia: Las librerías no se cargaron correctamente, pero intentaremos continuar...", "sys");
                    resolve();
                }
            }, 100);
        });
    }
    
    window.addEventListener('load', async () => {
        await esperarLibrerias();
        if (!libreriasCargadas) {
            addMsg("⚠️ Las librerías se cargan desde la carpeta local. Este navegador podría tener problemas con file://", "sys");
        }
    });


    zipInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;


        addMsg("📦 Leyendo ZIP...", "sys");


        try {
            // Usar JSZip con validación
            if (!window.JSZip) {
                addMsg("❌ Error: JSZip no está disponible", "sys");
                return;
            }
            
            const zip = await window.JSZip.loadAsync(file);
            const modelFiles = {};


            // Extraer archivos y crear URLs locales
            for (const name in zip.files) {
                const blob = await zip.files[name].async("blob");
                modelFiles[name] = URL.createObjectURL(blob);
            }


            // CONFIGURACIÓN OFFLINE
            if (!window.transformers) {
                addMsg("❌ Error: transformers no está disponible", "sys");
                return;
            }
            
            const tf = window.transformers;
            
            // Configurar para modo offline
            try {
                tf.env.allowRemoteModels = false;
                tf.env.allowLocalModels = true;
            } catch (e) {
                console.log("Nota: Configuración de env no disponible");
            }

            addMsg("🧠 Cargando IA en RAM...", "sys");


            // Crear el pipeline
            extractor = await tf.pipeline('feature-extraction', 'local-model', {
                model_file: modelFiles['model.onnx'] || modelFiles['onnx/model.onnx'],
                tokenizer_file: modelFiles['tokenizer.json'],
                config_file: modelFiles['config.json'],
            });


            addMsg("✅ IA Lista. Ya puedes chatear sin internet.", "ai");
            userInput.disabled = false;
            sendBtn.disabled = false;
            zipInput.style.display = "none";


        } catch (err) {
            addMsg("❌ Error: " + err.message, "sys");
            console.error(err);
        }
    };


    sendBtn.onclick = async () => {
        const text = userInput.value.trim();
        if (!text) return;


        addMsg(text, "user");
        userInput.value = "";
        
        try {
            // Ejecutar la IA
            const output = await extractor(text, { pooling: 'mean', normalize: true });
            addMsg("He procesado tu mensaje. Vector generado: " + output.data.length + " dimensiones.", "ai");
        } catch (err) {
            addMsg("Error al procesar el texto.", "ai");
        }
    };
</script>


</body>
</html>
